<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SeGO // CYBER_PULSE_ULTRA_FAST</title>
    <style>
        :root { --neon: #00ff41; --dim: #003b00; --bg: #050505; --alert: #ff003c; --alert-dim: #440010; }
        * { box-sizing: border-box; outline: none; }
        html, body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Terminus', 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden;
            text-shadow: 0 0 5px var(--neon);
            -webkit-user-select: none; user-select: none;
        }

        /* Scanlines - Zero impact on clicks */
        html::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%);
            background-size: 100% 4px; z-index: 1000; pointer-events: none;
        }

        .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; padding: 15px; gap: 15px; position: relative; z-index: 10; }
        .panel { border: 1px solid var(--neon); background: rgba(0, 255, 65, 0.03); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: var(--neon); color: var(--bg); padding: 5px 10px; font-weight: bold; font-size: 11px; display: flex; justify-content: space-between; }

        .stat-group { padding: 12px; border-bottom: 1px solid var(--dim); }
        .stat-val { font-size: 26px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        canvas { width: 100%; height: 80px; }

        .proc-view { flex-grow: 1; overflow-y: auto; border-top: 1px solid var(--dim); }
        .proc-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        .proc-table th { position: sticky; top: 0; background: var(--dim); color: var(--neon); text-align: left; padding: 10px 8px; z-index: 20; font-size: 10px; }
        .proc-table td { padding: 8px; border-bottom: 1px solid rgba(0, 255, 65, 0.05); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .proc-row { cursor: pointer; transition: 0.05s; }
        .proc-row:hover { background: rgba(0, 255, 65, 0.15); }
        .proc-row.selected { background: var(--neon) !important; color: var(--bg) !important; text-shadow: none; font-weight: bold; }
        .proc-row.removing { opacity: 0; transform: translateX(50px); transition: 0.3s; }

        .kill-zone { padding: 15px; border-top: 1px solid var(--alert-dim); }
        .kill-btn {
            width: 100%; padding: 25px; background: var(--alert-dim); border: 2px solid var(--alert);
            color: var(--alert); font-family: inherit; font-weight: bold; font-size: 18px;
            cursor: pointer; text-shadow: 0 0 10px var(--alert);
        }
        .kill-btn:hover { background: var(--alert); color: #fff; box-shadow: 0 0 40px var(--alert); }

        .pulse { animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body tabindex="1">

<div class="layout">
    <div class="panel">
        <div class="panel-header"><span>SYS_PULSE_FAST</span><span class="pulse">● INSTANT</span></div>
        <div class="stat-group">
            <div class="stat-label">CPU REALTIME</div>
            <canvas id="cpuChart"></canvas>
            <div id="cpuVal" class="stat-val">--%</div>
        </div>
        <div class="stat-group">
            <div class="stat-label">RAM USAGE</div>
            <div id="memVal" class="stat-val">-- MB</div>
        </div>
        <div class="stat-group">
            <div class="stat-label">UPTIME</div>
            <div id="uptimeVal" style="font-size: 11px; color: #888;">--</div>
        </div>
        <div style="flex-grow: 1;"></div>
        <div class="kill-zone">
            <button class="kill-btn" id="mainKillBtn" onclick="terminateProcess()">KILL_TASK</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header"><span>ORCHESTRATOR</span><span id="procCount">0 ACTIVE</span></div>
        <div class="proc-view">
            <table class="proc-table">
                <thead>
                    <tr><th style="width:75px">PID</th><th>NAME</th><th style="width:60px">CPU%</th><th style="width:60px">MEM%</th></tr>
                </thead>
                <tbody id="procBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const cpuCanvas = document.getElementById('cpuChart');
    const ctx = cpuCanvas.getContext('2d');
    let cpuHistory = new Array(60).fill(0);
    let selectedPid = null;
    let pidsList = [];

    async function call(cmd, args) {
        try {
            const res = await fetch('/api/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cmd, args})
            });
            return await res.json();
        } catch(e) { return {error: e.message}; }
    }

    function drawChart() {
        ctx.clearRect(0, 0, cpuCanvas.width, cpuCanvas.height);
        ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 2; ctx.beginPath();
        const step = cpuCanvas.width / (cpuHistory.length - 1);
        cpuHistory.forEach((v, i) => {
            const x = i * step;
            const y = cpuCanvas.height - (v * cpuCanvas.height / 100) - 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.lineTo(cpuCanvas.width, cpuCanvas.height); ctx.lineTo(0, cpuCanvas.height);
        ctx.fillStyle = 'rgba(0, 255, 65, 0.05)'; ctx.fill();
        requestAnimationFrame(drawChart);
    }

    async function updateData() {
        // ОПТИМИЗИРОВАННЫЙ ЗАПРОС: без top, всё через ps и /proc (работает мгновенно)
        const res = await call('bash', ['-c', "cat /proc/loadavg | awk '{print $1*10}'; free -m | awk 'NR==2{print $3}'; uptime -p; ps -eo pid,comm,%cpu,%mem --sort=-%cpu --no-headers | head -n 150"]);
        if(!res.output) return;

        const lines = res.output.trim().split('\n');
        const cpuLoad = parseFloat(lines[0]) || 0;
        document.getElementById('cpuVal').textContent = cpuLoad + '%';
        cpuHistory.push(cpuLoad); cpuHistory.shift();
        document.getElementById('memVal').textContent = lines[1] + ' MB';
        document.getElementById('uptimeVal').textContent = lines[2];

        const procLines = lines.slice(3);
        const tbody = document.getElementById('procBody');
        const rows = tbody.children;
        pidsList = [];

        procLines.forEach((line, i) => {
            const c = line.trim().split(/\s+/);
            const pid = c[0];
            pidsList.push(pid);

            if (!rows[i]) {
                const tr = document.createElement('tr');
                tr.className = 'proc-row';
                tr.innerHTML = `<td></td><td></td><td></td><td></td>`;
                tbody.appendChild(tr);
            }

            const tr = rows[i];
            tr.dataset.pid = pid;
            tr.cells[0].textContent = pid;
            tr.cells[1].textContent = c[1];
            tr.cells[2].textContent = c[2];
            tr.cells[3].textContent = c[3];
            tr.className = 'proc-row' + (selectedPid === pid ? ' selected' : '');
        });

        while(tbody.children.length > procLines.length) tbody.removeChild(tbody.lastChild);
        document.getElementById('procCount').textContent = procLines.length + " ACTIVE";
        if(selectedPid) document.getElementById('mainKillBtn').textContent = `KILL PID: ${selectedPid}`;
    }

    // ДЕЛЕГИРОВАНИЕ КЛИКОВ
    document.getElementById('procBody').addEventListener('mousedown', (e) => {
        const row = e.target.closest('.proc-row');
        if (!row) return;
        const pid = row.dataset.pid;
        selectRow(pid);
        if (e.button === 2) terminateProcess();
    });

    function selectRow(pid) {
        selectedPid = pid;
        document.getElementById('mainKillBtn').textContent = `KILL PID: ${pid}`;
        Array.from(document.querySelectorAll('.proc-row')).forEach(r => {
            r.classList.toggle('selected', r.dataset.pid === pid);
        });
        document.body.focus();
    }

    // Клавиатура
    window.addEventListener('keydown', (e) => {
        let idx = pidsList.indexOf(selectedPid);
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectRow(pidsList[Math.min(idx + 1, pidsList.length - 1)]);
            document.querySelector('.selected')?.scrollIntoView({block:'nearest'});
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectRow(pidsList[Math.max(idx - 1, 0)]);
            document.querySelector('.selected')?.scrollIntoView({block:'nearest'});
        } else if (e.key === 'Enter') {
            terminateProcess();
        }
    });

    async function terminateProcess() {
        if(!selectedPid) return;
        
        const pidToKill = selectedPid;
        const rowToHide = document.querySelector(`.proc-row[data-pid="${pidToKill}"]`);
        
        if(confirm(`TERMINATE ${pidToKill}?`)) {
            // OPTIMISTIC UI: удаляем визуально сразу
            if(rowToHide) rowToHide.classList.add('removing');
            
            const res = await call('pkexec', ['kill', '-9', pidToKill]);
            
            if(res.error) {
                alert("Error: " + res.error);
                if(rowToHide) rowToHide.classList.remove('removing');
            } else {
                selectedPid = null;
                updateData(); // Принудительное обновление
            }
        }
    }

    drawChart();
    setInterval(updateData, 1000); // Теперь можно опрашивать чаще, так как запрос быстрый
    updateData();
    window.oncontextmenu = () => false;
</script>
</body>
</html>
